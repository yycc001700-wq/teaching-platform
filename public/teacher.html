<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 老師後台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">🎓 教學遊戲平台</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="nav-user" id="teacherName">老師</span>
      <button class="btn btn-outline" style="padding:8px 16px;font-size:0.9rem;color:white;border-color:rgba(255,255,255,0.5);" onclick="logout()">登出</button>
    </div>
  </nav>

  <div class="container" style="padding-top:24px;">
    <!-- 頁籤 -->
    <div class="tabs" style="border-bottom-color:rgba(255,255,255,0.2);">
      <button class="tab-btn active" style="color:white;" onclick="switchTab('game', this)">🎮 遊戲控制</button>
      <button class="tab-btn" style="color:rgba(255,255,255,0.6);" onclick="switchTab('history', this)">📊 歷史成績</button>
    </div>

    <!-- 遊戲控制頁籤 -->
    <div id="tab-game" class="tab-content active">

      <!-- 選擇遊戲 / 建立房間 -->
      <div class="card" id="setupCard">
        <h2>🎯 建立遊戲房間</h2>
        <label>選擇遊戲</label>
        <select id="gameSelect">
          <option value="division">➗ 除法對戰</option>
        </select>
        <button class="btn btn-primary btn-lg mt-12" onclick="createRoom()">建立房間</button>
      </div>

      <!-- 等待學生加入 -->
      <div class="card" id="waitingCard" style="display:none;">
        <div class="flex-between mb-16">
          <h2>⏳ 等待學生加入</h2>
          <span class="badge badge-yellow" id="playerCountBadge">0 / 15 人</span>
        </div>

        <p class="text-gray mb-8">請告訴學生輸入以下房間代碼：</p>
        <div class="room-code" id="roomCodeDisplay">------</div>

        <h3 style="margin:16px 0 8px;color:#475569;">已加入的學生</h3>
        <div class="player-grid" id="waitingPlayerGrid"></div>

        <div id="waitingPlayerEmpty" class="text-center text-gray" style="padding:20px;">
          <div class="waiting-animation">
            <div class="waiting-dot"></div>
            <div class="waiting-dot"></div>
            <div class="waiting-dot"></div>
          </div>
          <p>等待學生加入...</p>
        </div>

        <div style="display:flex;gap:12px;margin-top:20px;">
          <button class="btn btn-success btn-lg" id="startBtn" onclick="startGame()" style="flex:1;" disabled>
            🚀 開始遊戲
          </button>
          <button class="btn btn-danger" onclick="cancelRoom()" style="padding:14px 20px;">取消</button>
        </div>
      </div>

      <!-- 遊戲進行中 -->
      <div class="card" id="gameCard" style="display:none;">
        <div class="flex-between mb-16">
          <h2>🎮 遊戲進行中</h2>
          <span class="badge badge-blue" id="questionProgress">第 0 / 15 題</span>
        </div>

        <div class="question-card" style="background:#f8fafc;border-radius:16px;padding:20px;margin-bottom:16px;">
          <p class="text-gray" style="font-size:0.9rem;">目前題目</p>
          <div class="question-text" id="teacherQuestion">---</div>
        </div>

        <h3 style="margin-bottom:12px;color:#475569;">學生答題狀況</h3>
        <div class="player-grid" id="gamePlayerGrid"></div>
      </div>

      <!-- 遊戲結束 -->
      <div class="card" id="endCard" style="display:none;">
        <h2>🏆 遊戲結束！成績報表</h2>
        <ol class="leaderboard" id="finalLeaderboard" style="margin-top:16px;"></ol>
        <button class="btn btn-primary btn-lg mt-24" onclick="resetGame()">🔄 再來一場</button>
      </div>
    </div>

    <!-- 歷史成績頁籤 -->
    <div id="tab-history" class="tab-content">
      <div class="card">
        <div class="flex-between mb-16">
          <h2>📊 歷史成績</h2>
          <button class="btn btn-outline" style="padding:8px 16px;font-size:0.9rem;" onclick="loadHistory()">🔄 重新整理</button>
        </div>
        <div id="historyList"><p class="text-gray text-center">載入中...</p></div>
      </div>

      <!-- 成績詳情 -->
      <div class="card" id="historyDetail" style="display:none;">
        <div class="flex-between mb-16">
          <h2>📋 場次詳情</h2>
          <button class="btn btn-outline" style="padding:8px 16px;font-size:0.9rem;" onclick="closeHistoryDetail()">關閉</button>
        </div>
        <div id="historyDetailContent"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="teacher.js"></script>
</body>
</html>
