<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 教學遊戲平台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .floating-emoji {
      font-size: 4rem;
      animation: floatY 2s ease-in-out infinite alternate;
      margin-bottom: 16px;
    }
    @keyframes floatY {
      from { transform: translateY(-8px); }
      to { transform: translateY(8px); }
    }
    .stars-bg {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .star-bg {
      position: absolute;
      width: 4px; height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d) var(--delay) infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.7; }
    }
    .content { position: relative; z-index: 1; width: 100%; }
  </style>
</head>
<body>
  <div class="stars-bg" id="starsBg"></div>

  <div class="content text-center">
    <div class="floating-emoji">🎮</div>
    <h1 class="hero-title">教學遊戲平台</h1>
    <p class="hero-subtitle">快樂學習，一起挑戰！</p>

    <div class="hero-btn">
      <a href="student.html" class="btn" style="background: linear-gradient(135deg, #7c3aed, #4f46e5); color:white;">
        🎮 學生加入遊戲
      </a>
      <a href="login.html" class="btn" style="background: rgba(255,255,255,0.15); color:white; border: 2px solid rgba(255,255,255,0.4);">
        🎓 老師登入
      </a>
    </div>

    <p class="text-center mt-24" style="color:rgba(255,255,255,0.5); font-size:0.9rem;">
      © 2024 教學遊戲平台
    </p>
  </div>

  <script>
    // 生成背景星星
    const bg = document.getElementById('starsBg');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star-bg';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--d', (2 + Math.random() * 3) + 's');
      s.style.setProperty('--delay', (Math.random() * 4) + 's');
      bg.appendChild(s);
    }
  </script>
</body>
</html>
